# Render Blueprint (optional). You can also create the service manually in the
# Render dashboard: New → Web Service → Docker → Root Directory = services/komikcast-scraper.
services:
  - type: web
    name: komikcast-scraper
    runtime: docker
    rootDir: services/komikcast-scraper
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: KOMIKCAST_BASE_URL
        value: https://v3.komikcast.fit
      - key: SCRAPER_SECRET
        sync: false # set your own random secret in the dashboard
      # - key: SINGLE_PROCESS
      #   value: "false"   # uncomment if Chromium crashes with --single-process
