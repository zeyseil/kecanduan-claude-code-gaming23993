name = "komik-tracker-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Keep-alive: sekali sehari jam 03:00 UTC, baca ringan ke Astra supaya DB free
# tier tidak dihibernasi karena idle. Handler: src/scheduled.ts. Cron hanya
# jalan di Worker yang sudah di-deploy, bukan di `wrangler dev`.
[triggers]
crons = ["0 3 * * *"]

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[durable_objects.bindings]]
name = "USER_RATE_LIMITER"
class_name = "UserRateLimiter"

# Free plan requires Durable Objects to be SQLite-backed (`new_sqlite_classes`).
# Both DOs here are in-memory token buckets and never touch storage, so the
# SQLite backing is inert — it only satisfies the free-tier requirement.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserRateLimiter"]

# Token -> user_id lookup for browser-facing auth. `id` = production namespace
# (`wrangler kv namespace create AUTH_TOKENS`), `preview_id` = separate dev
# namespace (`wrangler kv namespace create AUTH_TOKENS --preview`). `remote =
# true` connects this binding to the real Cloudflare KV during `wrangler dev`
# (mixed mode) while Durable Objects stay local-simulated — plain `--remote`
# for the whole Worker is no longer supported once a DO binding is present
# (see apps/worker/README.md "Setup Auth").
[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "503fa9ce6c7446f78e50eb8845cbeac5"
preview_id = "d39de01963b04b3bb1dc271e12697b59"
remote = true
